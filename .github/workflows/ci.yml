name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: node ./node_modules/typescript/bin/tsc --noEmit

      - name: Run tests
        # supabase.ts calls createClient(...) at module load, which throws
        # synchronously if the URL is missing — even validation/unit tests
        # would crash on import. So we ALWAYS set non-empty env vars (with
        # dummy fallbacks), and pick the suite based on whether real
        # secrets were configured.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'dummy-key-for-unit-tests' }}
          HAS_SUPABASE_SECRETS: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_ANON_KEY != '' }}
        run: |
          if [ "$HAS_SUPABASE_SECRETS" = "true" ]; then
            node ./node_modules/vitest/vitest.mjs run
          else
            echo "::warning::SUPABASE_URL / SUPABASE_ANON_KEY secrets not configured. Running unit-only suite."
            node ./node_modules/vitest/vitest.mjs run \
              src/__tests__/validation.test.ts \
              src/__tests__/errors.test.ts \
              src/__tests__/postgisPoint.test.ts
          fi

  frontend:
    name: Frontend — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: node ./node_modules/typescript/bin/tsc --noEmit
